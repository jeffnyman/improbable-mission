<!DOCTYPE html>
<html lang="en-US" dir="ltf" class="no-js">
<head>
  <meta charset="UTF-8">
  <title>Improbable Mission</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Jeff Nyman">
  <meta name="description" content="A modern recreation of the 1984 Epyx game 'Impossible Mission' built with JavaScript.">
  <meta name="canonical" href="https://jeffnyman.github.io/improbable-mission">
  <link rel="preload" href="/fonts/c64-webfont.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="icon" type="image/svg+xml" href="/site/favicon.svg">
  <link rel="icon" type="image/png" sizes="96x96" href="/site/favicon.png">
  <link rel="icon" type="image/x-icon" sizes="48x48" href="/site/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/site/apple-touch-icon.png">
  <link rel="manifest" href="/site/site.webmanifest">
  <link rel="stylesheet" href="./styles/mission.css">
  <script type="module" src="./scripts/mission.js" defer></script>
</head>
<body>
  <div id="mission">
    <table class="game-in-monitor">
      <tr>
        <td colspan="3">
          <img src="/images/landing/moni-top.gif" alt="Monitor Top">
        </td>
      </tr>
      <tr>
        <td>
          <img src="/images/landing/moni-left.gif" alt="Monitor Left">
        </td>
        <td>
          <img src="/images/landing/moni-screen.png" alt="Monitor Screen">
        </td>
        <td>
          <img src="/images/landing/moni-right.gif" alt="Monitor Right">
        </td>
      </tr>
      <tr>
        <td colspan="3">
          <img src="/images/landing/moni-bottom.gif" alt="Monitor Bottom">
        </td>
      </tr>
    </table>

    <p id="accept-mission">
      ACCEPT THE MISSION
    </p>
  </div>
  
  <div id="app" class="hidden">
    App Goes Here
  </div>

  <div id="unsupported" class="hidden">
    <h2>Unsupported Browser</h2>

    <p>
      Your browser does not support this game for the following reasons:
    </p>

    <ul></ul>
  </div>

  <noscript>
    You have to enable JavaScript in your browser to play this game.
  </noscript>
</body>
</html>
