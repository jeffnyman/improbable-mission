<!DOCTYPE html>
<html lang="en-US" dir="auto" class="no-js">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Improbable Mission</title>
  <meta name="description" content="An Homage to Epyx's 1984 'Impossible Mission' Game">
  <meta name="author" content="Jeff Nyman">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="icon" type="image/svg+xml" href="./site/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="./site/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="96x96" href="./site/favicon-96x96.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./site/favicon-16x16.png">
  <script type="module">
    document.documentElement.classList.replace("no-js", "js");
  </script>
  <script type="module" src="./src/scripts/main.ts"></script>
</head>
<body>
  <div id="mission" class="mission">
    <table class="game-in-monitor">
      <tr>
        <td colspan="3">
          <img src="./images/landing/moni-top.gif" alt="Monitor Top">
        </td>
      </tr>
      <tr>
        <td>
          <img src="./images/landing/moni-left.gif" alt="Monitor Left">
        </td>
        <td>
          <img src="./images/landing/moni-screen.png" alt="Monitor Screen">
        </td>
        <td>
          <img src="./images/landing/moni-right.gif" alt="Monitor Right">
        </td>
      </tr>
      <tr>
        <td colspan="3">
          <img src="./images/landing/moni-bottom.gif" alt="Monitor Bottom">
        </td>
      </tr>
    </table>

    <p class="accept-mission">
      <span id="accept-mission">ACCEPT THE MISSION</span>
    </p>
  </div>

  <div id="app" class="hidden"></div>

  <div id="footer" class="footer">
    <span>Powered with Vite</span>
    <img src="/site/vite.svg">
    <span>+ TypeScript</span>
    <img src="/site/typescript.svg">
  </div>
</body>
</html>
