<!DOCTYPE html>
<html lang="en-US" dir="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Improbable Mission</title>
  <meta name="description" content="An Homage to Epyx's 1984 'Impossible Mission' Game">
  <meta name="author" content="Jeff Nyman">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="96x96" href="./favicon-96x96.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
  <script type="module" src="./src/scripts/main.ts"></script>
</head>
<body>
  <div class="mission">
    <table class="game-in-monitor">
      <tr>
        <td colspan="3">
          <img src="./images/site/moni-top.gif" alt="Monitor Top">
        </td>
      </tr>
      <tr>
        <td>
          <img src="./images/site/moni-left.gif" alt="Monitor Left">
        </td>
        <td>
          <img src="./images/site/moni-screen.png" alt="Monitor Screen">
        </td>
        <td>
          <img src="./images/site/moni-right.gif" alt="Monitor Right">
        </td>
      </tr>
      <tr>
        <td colspan="3">
          <img src="./images/site/moni-bottom.gif" alt="Monitor Bottom">
        </td>
      </tr>
    </table>

    <p class="accept-mission">
      <span id="accept-mission">ACCEPT THE MISSION</span>
    </p>
  </div>
</body>
</html>
